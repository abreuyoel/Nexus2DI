# map debe vivir en el contexto http{} — este archivo se incluye ahí desde
# el nginx.conf base de la imagen (conf.d/*.conf), así que puede ir a nivel
# de archivo, antes del bloque server.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Headers de seguridad — a nivel server para que los hereden todas las
    # locations (si alguna location definiera su propio add_header, dejaría
    # de heredar estos; por eso las locations de abajo no declaran ninguno).
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    # connect-src incluye fonts.gstatic.com además de font-src: el service
    # worker de Angular (ngsw-worker.js) trae las fuentes vía fetch() propio
    # (safeFetch) en vez de dejar que el navegador las cargue nativamente
    # como @font-face, y esa ruta de red la gobierna connect-src, no font-src
    # — verificado en vivo: sin esto, Material Icons quedaba bloqueado con
    # "Refused to connect" pese a que font-src ya lo permitía.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https://*.basemaps.cartocdn.com https://tiles.openfreemap.org; connect-src 'self' https://fonts.gstatic.com https://tiles.openfreemap.org wss://www.nexus2di.net; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self';" always;

    # Healthcheck propio de nginx para las probes del pod — nunca se reenvía
    # al backend.
    location = /healthz {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Chat y notificaciones viven bajo /api/.../ws/... (mismo prefijo, sin
    # /ws separado) — por eso los headers de upgrade van en /api/, no en una
    # location aparte.
    location /api/ {
        proxy_pass http://nexus2di-backend-svc:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        # No sobreescribir con $remote_addr: dentro del clúster sería la IP
        # del propio pod de nginx. Cloudflare ya pone CF-Connecting-IP en la
        # petición entrante; solo se reenvía tal cual llegó (proxy_pass
        # reenvía todos los headers no explícitamente redefinidos aquí).
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /auth/ {
        proxy_pass http://nexus2di-backend-svc:8000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular routing — todo lo que no matcheó arriba y no es un archivo
    # estático real cae en index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
