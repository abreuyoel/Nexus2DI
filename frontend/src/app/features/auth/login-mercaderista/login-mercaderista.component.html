<!-- login-mercaderista.component.html -->
<div class="min-h-screen relative flex items-center justify-center overflow-hidden bg-slate-950 font-sans">
  <!-- Mesh Gradient -->
  <div class="absolute inset-0 z-0">
    <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/20 blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-slate-600/20 blur-[120px] animate-pulse delay-700"></div>
  </div>

  <div class="relative z-10 w-full max-w-[440px] px-6 animate-in fade-in zoom-in-95 duration-700">
    <div class="bg-white/[0.03] backdrop-blur-2xl rounded-[2.5rem] border border-white/10 shadow-2xl overflow-hidden">
      <div class="px-10 pt-12 pb-8 text-center border-b border-white/5">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-emerald-600 to-teal-500 shadow-xl shadow-emerald-500/20 mb-6">
          <mat-icon class="text-white !text-3xl">badge</mat-icon>
        </div>
        <h1 class="text-3xl font-black text-white tracking-tighter mb-1">Portal Mercaderista</h1>
        <p class="text-slate-400 font-medium text-sm">Autenticación por Cédula</p>
      </div>

      <div class="px-10 py-10">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
          <div class="space-y-2 group">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Documento de Identidad</label>
            <div class="relative">
              <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors">assignment_ind</mat-icon>
              <input 
                matInput 
                formControlName="cedula" 
                placeholder="Ej: V-12345678"
                class="w-full h-14 pl-12 bg-white/5 border border-white/10 rounded-2xl text-white focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium"
              >
            </div>
          </div>

          <div class="space-y-2 group">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Contraseña</label>
            <div class="relative">
              <mat-icon class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors">lock</mat-icon>
              <input 
                matInput 
                [type]="showPass() ? 'text' : 'password'" 
                formControlName="password" 
                placeholder="••••••••"
                class="w-full h-14 pl-12 pr-12 bg-white/5 border border-white/10 rounded-2xl text-white focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium"
              >
              <button 
                type="button" 
                (click)="showPass.set(!showPass())"
                class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors"
              >
                <mat-icon class="!text-xl">{{ showPass() ? 'visibility' : 'visibility_off' }}</mat-icon>
              </button>
            </div>
          </div>

          @if (error()) {
            <div class="bg-rose-500/10 border border-rose-500/20 p-4 rounded-2xl flex items-center gap-3">
              <mat-icon class="text-rose-500 text-sm">error</mat-icon>
              <p class="text-[10px] font-bold text-rose-200">{{ error() }}</p>
            </div>
          }

          <button 
            type="submit" 
            [disabled]="loading() || form.invalid"
            class="w-full h-14 bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-600 text-white rounded-2xl font-black uppercase tracking-widest text-xs shadow-xl shadow-emerald-500/20 transition-all active:scale-[0.98]"
          >
            @if (loading()) { <mat-spinner diameter="24" class="mx-auto"></mat-spinner> }
            @else { Ingresar al Sistema }
          </button>
        </form>
      </div>

      <div class="px-10 py-6 bg-white/[0.02] border-t border-white/5 text-center">
        <a routerLink="/login" class="inline-flex items-center gap-2 text-xs font-bold text-slate-500 hover:text-white transition-colors">
          <mat-icon class="!text-sm">arrow_back</mat-icon>
          Volver al Login General
        </a>
      </div>
    </div>
  </div>
</div>
