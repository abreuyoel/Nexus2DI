<!-- login-mercaderista.component.html -->
<div class="min-h-screen relative flex items-center justify-center overflow-hidden bg-slate-950 font-sans">
  <!-- Mesh Gradient (reduced effects on mobile for performance) -->
  <div class="absolute inset-0 z-0">
    <div
      class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-emerald-600/20 blur-[120px] max-sm:blur-0 animate-pulse max-sm:animate-none">
    </div>
    <div
      class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-slate-600/20 blur-[120px] max-sm:blur-0 animate-pulse max-sm:animate-none delay-700">
    </div>
  </div>

  <div class="relative z-10 w-full max-w-[440px] px-4 sm:px-6 animate-in fade-in zoom-in-95 duration-700">
    <div
      class="bg-white/[0.03] backdrop-blur-2xl max-sm:backdrop-blur-none rounded-[1.75rem] sm:rounded-[2.5rem] border border-white/10 shadow-2xl overflow-hidden">
      <div class="px-6 sm:px-10 pt-8 sm:pt-12 pb-6 sm:pb-8 text-center border-b border-white/5">
        <div
          class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-tr from-emerald-600 to-teal-500 shadow-xl shadow-emerald-500/20 mb-6">
          <mat-icon class="text-white !text-3xl">badge</mat-icon>
        </div>
        <h1 class="text-xl sm:text-3xl font-black text-white tracking-tighter mb-1">Portal Mercaderista</h1>
        <p class="text-slate-400 font-medium text-xs sm:text-sm">Autenticación por Cédula</p>
      </div>

      <div class="px-6 sm:px-10 py-6 sm:py-10">
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4 sm:space-y-6">
          <div class="space-y-1.5 sm:space-y-2 group">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Documento de
              Identidad</label>
            <div class="relative">
              <mat-icon
                class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors">assignment_ind</mat-icon>
              <input matInput formControlName="cedula" placeholder="Ej: V-12345678"
                class="w-full h-12 sm:h-14 pl-10 sm:pl-12 bg-white/5 border border-white/10 rounded-xl sm:rounded-2xl text-white focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium text-sm sm:text-base">
            </div>
          </div>

          <div class="space-y-1.5 sm:space-y-2 group">
            <label class="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] ml-1">Contraseña</label>
            <div class="relative">
              <mat-icon
                class="absolute left-3 sm:left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-emerald-400 transition-colors">lock</mat-icon>
              <input matInput [type]="showPass() ? 'text' : 'password'" formControlName="password"
                placeholder="••••••••"
                class="w-full h-12 sm:h-14 pl-10 sm:pl-12 pr-10 sm:pr-12 bg-white/5 border border-white/10 rounded-xl sm:rounded-2xl text-white focus:border-emerald-500/50 focus:ring-4 focus:ring-emerald-500/10 transition-all outline-none font-medium text-sm sm:text-base">
              <button type="button" (click)="showPass.set(!showPass())"
                class="absolute right-3 sm:right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors">
                <mat-icon class="!text-lg sm:!text-xl">{{ showPass() ? 'visibility' : 'visibility_off' }}</mat-icon>
              </button>
            </div>
          </div>

          @if (error()) {
          <div
            class="bg-rose-500/10 border border-rose-500/20 p-3 sm:p-4 rounded-xl sm:rounded-2xl flex items-center gap-2 sm:gap-3">
            <mat-icon class="text-rose-500 !text-lg sm:!text-xl">error</mat-icon>
            <p class="text-[10px] font-bold text-rose-200">{{ error() }}</p>
          </div>
          }

          <button type="submit" [disabled]="loading() || form.invalid"
            class="w-full h-12 sm:h-14 bg-emerald-500 hover:bg-emerald-600 disabled:bg-slate-800 disabled:text-slate-600 text-white rounded-xl sm:rounded-2xl font-black uppercase tracking-widest text-[11px] sm:text-xs shadow-xl shadow-emerald-500/20 transition-all active:scale-[0.98]">
            @if (loading()) { <mat-spinner diameter="20" class="mx-auto sm:mat-spinner-diameter-24"></mat-spinner> }
            @else { Ingresar al Sistema }
          </button>
        </form>
      </div>

      <div class="px-6 sm:px-10 py-4 sm:py-6 bg-white/[0.02] border-t border-white/5 text-center">
        <a routerLink="/login"
          class="inline-flex items-center gap-2 text-[11px] sm:text-xs font-bold text-slate-500 hover:text-white transition-colors">
          <mat-icon class="!text-sm">arrow_back</mat-icon>
          Volver al Login General
        </a>
      </div>
    </div>
  </div>
</div>
