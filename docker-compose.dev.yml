# docker-compose.dev.yml — Infraestructura local para desarrollo
# SQL Server corre en tu máquina local (ya instalado).
# Solo Docker para Redis y Azurite (emulador Azure Storage).
#
# Uso:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml down        # parar
#   docker compose -f docker-compose.dev.yml down -v     # parar + borrar datos

services:

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: nexus2di_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Azurite (emulador Azure Blob / Queue / Table Storage) ────────────────
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite:latest
    container_name: nexus2di_azurite
    ports:
      - "10000:10000"   # Blob
      - "10001:10001"   # Queue
      - "10002:10002"   # Table
    volumes:
      - azurite_data:/data
    command: azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
  azurite_data:
