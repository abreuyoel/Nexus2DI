# Plantilla — documenta qué claves espera el Secret real. El Secret real
# NUNCA se commitea: se crea a mano en el servidor con:
#
#   kubectl create secret generic nexus2di-backend-secret \
#     --from-literal=SECRET_KEY='<generado con: openssl rand -hex 64>' \
#     --from-literal=DB_USER='dev' \
#     --from-literal=DB_PASSWORD='<contraseña ROTADA, nunca la vieja filtrada>' \
#     --from-literal=AZURE_STORAGE_CONNECTION_STRING='<connection string real>' \
#     --from-literal=VAPID_PRIVATE_KEY='<si se usa push>' \
#     --from-literal=VAPID_PUBLIC_KEY='<si se usa push>'
apiVersion: v1
kind: Secret
metadata:
  name: nexus2di-backend-secret
type: Opaque
stringData:
  SECRET_KEY: "CHANGE_ME"
  DB_USER: "CHANGE_ME"
  DB_PASSWORD: "CHANGE_ME"
  AZURE_STORAGE_CONNECTION_STRING: "CHANGE_ME"
  VAPID_PRIVATE_KEY: ""
  VAPID_PUBLIC_KEY: ""
